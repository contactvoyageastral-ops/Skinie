kind = "web"
previewPath = "/"
title = "Skinie"
version = "1.0.0"
id = "artifacts/skinie"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18699

[services.development]
run = "pnpm --filter @workspace/skinie run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skinie", "run", "build" ]
publicDir = "artifacts/skinie/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18699"
BASE_PATH = "/"
